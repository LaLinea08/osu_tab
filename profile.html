<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu! Player Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --osu-pink: #ff66aa;
            --osu-pink-hover: #ff88bb;
            --text-main: #ffffff;
            --text-muted: #e2d9e6;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(42, 34, 48, 0.45);
            --glass-bg-hover: rgba(56, 46, 67, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
        }

        body {
            font-family: 'Exo 2', Arial, sans-serif;
            background: radial-gradient(circle at 80% 20%, #382445 0%, #17111c 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navbar (Reused from your index) */
        header {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 65px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        
        .osu-logo-circle {
            width: 30px; height: 30px;
            background-color: var(--osu-pink);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--osu-pink);
        }

        h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            padding: 0 15px;
        }

        /* Main Content */
        main {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Search Bar Mini */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            backdrop-filter: var(--glass-blur);
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--osu-pink);
        }

        .search-bar button {
            background: var(--osu-pink);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 50px;
            font-weight: 700;
            font-family: 'Exo 2', sans-serif;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 102, 170, 0.2);
        }

        /* Player Profile Card */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 30px;
        }

        /* Mock Avatar */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: url('https://a.ppy.sh/') center/cover; /* Standard osu! avatar URL structure */
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--osu-pink);
            box-shadow: 0 0 20px rgba(255, 102, 170, 0.3);
        }

        .player-info h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 5px 0;
        }

        .rank-badge {
            display: inline-block;
            background: var(--osu-pink);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(255, 102, 170, 0.4);
        }

        .country-rank {
            color: var(--text-muted);
            margin-left: 10px;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 102, 170, 0.3);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-area">
                <span class="osu-logo-circle"></span>
                <h1>osu! tracker</h1>
            </div>
            <nav>
                <a href="index.html">home</a>
                <a href="#">search</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search another player...">
    <button id="searchBtn">Search</button>
</div>

        <div class="profile-card">
    <div class="profile-header">
        <div class="avatar" id="playerAvatar"></div>
        <div class="player-info">
            <h2 id="playerName">PlayerName</h2>
            <div>
                <span class="rank-badge" id="playerRank">#0</span>
                <span class="country-rank" id="playerCountry">US #0</span>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Performance</div>
            <div class="stat-value" id="playerPP">0 pp</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Hit Accuracy</div>
            <div class="stat-value" id="playerAcc">0.00%</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Play Count</div>
            <div class="stat-value" id="playerPlayCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Max Combo</div>
            <div class="stat-value" id="playerCombo">0x</div>
        </div>
        <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="playerLevel">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Play Time</div>
                    <div class="stat-value" id="playerPlayTime">0h</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Ranked Score</div>
                    <div class="stat-value" id="playerScore">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">SS / S Ranks</div>
                    <div class="stat-value" id="playerRanks">0 / 0</div>
                </div>
    </div>
</div>
    </main>
<script>
    // 1. Put your actual Cloudflare Worker URL here
    const WORKER_URL = "https://osu-tracker-api.eliamelliger.workers.dev";

    // 2. Grab the elements from the page
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    // 3. The function that gets the data
    async function fetchPlayerData(username) {
        try {
            // Change button text so the user knows it's working
            searchBtn.innerText = "Loading...";

            // Ask your Worker for the data
            const response = await fetch(`${WORKER_URL}?user=${username}`);
            const data = await response.json();

            if (data.error) {
                alert("Player not found!");
                searchBtn.innerText = "Search";
                return;
            }

            // 4. Inject the data into your HTML!
            document.getElementById('playerName').innerText = data.username;
            document.getElementById('playerAvatar').style.backgroundImage = `url('${data.avatar_url}')`;
            
            // Format numbers nicely with commas (e.g., 10000 -> 10,000)
            document.getElementById('playerRank').innerText = `#${data.statistics.global_rank?.toLocaleString() || 'N/A'}`;
            document.getElementById('playerCountry').innerText = `${data.country_code} #${data.statistics.country_rank?.toLocaleString() || 'N/A'}`;
            
            document.getElementById('playerPP').innerText = `${Math.round(data.statistics.pp).toLocaleString()} pp`;
            document.getElementById('playerAcc').innerText = `${data.statistics.hit_accuracy.toFixed(2)}%`;
            document.getElementById('playerPlayCount').innerText = data.statistics.play_count.toLocaleString();
            document.getElementById('playerCombo').innerText = `${data.statistics.maximum_combo.toLocaleString()}x`;

            // --- NEW STATS ---
            // Level
            document.getElementById('playerLevel').innerText = data.statistics.level.current;
            
            // Play time is given in seconds, so we divide by 3600 to get hours
            const hoursPlayed = Math.round(data.statistics.play_time / 3600);
            document.getElementById('playerPlayTime').innerText = `${hoursPlayed.toLocaleString()}h`;
            
            // Ranked Score
            document.getElementById('playerScore').innerText = data.statistics.ranked_score.toLocaleString();
            
            // Grades (combining normal SS/S with silver SS/S)
            const totalSS = data.statistics.grade_counts.ss + data.statistics.grade_counts.ssh;
            const totalS = data.statistics.grade_counts.s + data.statistics.grade_counts.sh;
            document.getElementById('playerRanks').innerText = `${totalSS.toLocaleString()} / ${totalS.toLocaleString()}`;

            // Reset button text
            searchBtn.innerText = "Search";

        } catch (error) {
            console.error("Error fetching data:", error);
            alert("Something went wrong!");
            searchBtn.innerText = "Search";
        }
    }

    // 5. Make the button run the function
    searchBtn.addEventListener('click', () => {
        const username = searchInput.value.trim();
        if (username) {
            fetchPlayerData(username);
        }
    });

    // 6. Make hitting "Enter" on the keyboard work too
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });

    // Optional: Load a default player when the page first opens
    window.onload = () => {
        fetchPlayerData('mrekk'); // Loads the current #1 player automatically
    };
</script>
</body>
</html>
