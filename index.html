<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu! Glass Edition</title>
    <!-- Importing Exo 2 font family -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --osu-pink: #ff66aa;
            --osu-pink-hover: #ff88bb;
            --text-main: #ffffff;
            --text-muted: #e2d9e6;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(42, 34, 48, 0.45);
            --glass-bg-hover: rgba(56, 46, 67, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
        }

        body {
            font-family: 'Exo 2', Arial, sans-serif;
            /* A deep plum gradient background to make the glass effect pop */
            background: radial-gradient(circle at 80% 20%, #382445 0%, #17111c 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glass Top Navbar */
        header {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); /* Safari Support */
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 65px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Glowing osu! logo circle */
        .osu-logo-circle {
            width: 35px;
            height: 35px;
            background-color: var(--osu-pink);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 15px var(--osu-pink);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .osu-logo-circle:hover {
            transform: scale(1.15) rotate(10deg);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        nav {
            display: flex;
            height: 100%;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            padding: 0 20px;
            display: flex;
            align-items: center;
            position: relative;
            transition: color 0.2s ease, background-color 0.2s ease;
        }

        nav a:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Neon pink indicator line */
        nav a:hover::after, nav a.active::after {
            content: '';
            position: absolute;
            bottom: -1px; /* aligns perfectly with the glass border */
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--osu-pink);
            box-shadow: 0 -2px 10px var(--osu-pink);
        }

        /* Main Content Container */
        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Frosty Glass Card */
        .welcome-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-left: 6px solid var(--osu-pink); /* Signature pink accent track */
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .welcome-card h2 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .welcome-card p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 1.15rem;
        }

        /* Glowing Frosted Button */
        .btn-primary {
            display: inline-block;
            background: rgba(255, 102, 170, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 20px;
            border: 1px solid rgba(255, 102, 170, 0.4);
            box-shadow: 0 4px 15px rgba(255, 102, 170, 0.15);
            backdrop-filter: var(--glass-blur);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--osu-pink);
            box-shadow: 0 0 20px var(--osu-pink);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-area">
                <span class="osu-logo-circle"></span>
                <h1>osu!</h1>
            </div>
            <nav>
    <a href="index.html" class="active">home</a>
    <a href="profile.html">player search</a>
    <a href="https://osu.ppy.sh" target="_blank">official osu!</a>
</nav>
        </div>
    </header>

    <main>
        <div class="welcome-card">
    <h2>osu! Stat Tracker</h2>
    <p>Welcome to your custom osu! dashboard. Use the search tool to look up any player, view their global rankings, performance points, and hit accuracy in a sleek, glass-themed interface.</p>
    <a href="profile.html" class="btn-primary">Search for a Player</a>
</div>
    </main>

</body>
</html>
