<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple osu! Style Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2C2F33;
            color: #F5F8FA;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        header {
            background-color: #4B4E53;
            padding: 1em;
            text-align: center;
        }
        nav {
            margin-top: 1em;
        }
        nav a {
            color: #F5F8FA;
            text-decoration: none;
            margin-right: 1em;
        }
        main {
            margin-top: 2em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to osu!</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Support</a>
        <a href="#">Help</a>
    </nav>
    <main>
        <p>This is a simple page styled to resemble the osu! website.</p>
    </main>
</body>
</html>
