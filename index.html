<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu!Stats - Home</title>
    <!-- Importing Exo 2 font family -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --osu-pink: #ff66aa;
            --text-main: #ffffff;
            --text-muted: #e2d9e6;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(42, 34, 48, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
        }

        body {
            font-family: 'Exo 2', Arial, sans-serif;
            background: radial-gradient(circle at 80% 20%, #382445 0%, #17111c 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navbar */
        header {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 65px;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .osu-logo-circle {
            width: 30px; 
            height: 30px;
            background-color: var(--osu-pink);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--osu-pink);
        }

        nav {
            display: flex;
            height: 100%;
            align-items: center;
        }

        nav a { 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 600; 
            padding: 0 15px; 
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
            transition: color 0.2s ease, background-color 0.2s ease;
        }

        nav a:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Neon pink indicator line for active/hover tabs */
        nav a:hover::after, nav a.active::after {
            content: '';
            position: absolute;
            bottom: -1px; 
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--osu-pink);
            box-shadow: 0 -2px 10px var(--osu-pink);
        }

        /* --- COMBINED NAVBAR TITLE & GLOW --- */
        .nav-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .nav-title span {
            color: var(--osu-pink, #ff66aa);
            text-shadow: 0 0 15px rgba(255, 102, 170, 0.6);
        }

        .ambient-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw; 
            height: 300px;
            background: radial-gradient(ellipse at top, rgba(255, 102, 170, 0.15) 0%, transparent 70%);
            z-index: -1; 
            pointer-events: none; 
        }

        /* Main Content Container */
        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Frosty Glass Card (Specific to Home Page) */
        .welcome-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-left: 6px solid var(--osu-pink); 
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .welcome-card h2 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .welcome-card p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 1.15rem;
        }

        /* Glowing Frosted Button (Specific to Home Page) */
        .btn-primary {
            display: inline-block;
            background: rgba(255, 102, 170, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 20px;
            border: 1px solid rgba(255, 102, 170, 0.4);
            box-shadow: 0 4px 15px rgba(255, 102, 170, 0.15);
            backdrop-filter: var(--glass-blur);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--osu-pink);
            box-shadow: 0 0 20px var(--osu-pink);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <!-- The background glow attached to the navbar -->
        <div class="ambient-glow"></div>
        
        <div class="nav-container">
            <div class="logo-area">
                <span class="osu-logo-circle"></span>
                <h1 class="nav-title">osu!<span>tab</span></h1>
            </div>
            
           <nav>
                <a href="index.html" class="active">home</a>
                <a href="https://osu.ppy.sh" target="_blank">official osu!</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="welcome-card">
            <h2>osu! Stat Tracker</h2>
            <p>Welcome to your custom osu! dashboard. Use the search tool to look up any player, view their global rankings, performance points, and hit accuracy in a sleek, glass-themed interface.</p>
            <a href="profile.html" class="btn-primary">Search for a Player</a>
        </div>
    </main>

</body>
</html>
